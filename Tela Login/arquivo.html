<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datalumini - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">

</head>
<body>

    <div class="wrapper">
        <header class="header">
            <button class="back-button">‹</button>
            <h1 class="brand-name">Datalumini</h1>
            <div class="icon">
                <img src="img/logo.png" alt="logo">
            </div>
        </header>

        <main class="login-card">
            <div class="image-side">
                <img src="img/flores.png" alt="Flores">
            </div>

            <div class="form-side">
                <h2>LOGIN</h2>
                
                <form>
                    <div class="input-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail de login:">
                    </div>

                    <div class="input-group">
                        <label for="pass">Senha:</label>
                        <input type="password" id="pass" placeholder="Digite sua senha:">
                    </div>

                    <div class="options">
                        <input type="checkbox" id="check">
                        <label for="check">Mantenha-me conectado</label>
                    </div>

                    <button type="submit" class="entrar-button">ENTRAR</button>
                </form>

                <div class="footer-links">
                    <a href="#" class="forgot">Esqueci a senha</a>
                    <p>Não tem login ainda? <a href="#"><strong>Cadastre-se!</strong></a></p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
