<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./styles/cadastro.css">
    <link rel="shortcut icon" href="./img/logo.ico" type="image/x-icon">

</head>

<body>

    <div class="wrapper">

        <div class="header">
            <button class="back-button"><a href="./index.html">←</a></button>
            <div class="brand-name">Datalumini</div>
            <div class="icon">
                <img src="./img/logo.png">
            </div>
        </div>

        <div class="login-card">

            <div class="form-side">
                <h2>CADASTRE-SE</h2>

                <div class="form-grid">
                    <div id="primeira_parte_form">
                        <div class="input-group">
                            <label>Nome Completo:</label>
                            <input type="text" placeholder="Digite seu nome">
                        </div>
                        <div class="input-group">
                            <label>E-mail:</label>
                            <input type="email" placeholder="Digite seu e-mail">
                        </div>
                        <div class="input-group">
                            <label>CPF:</label>
                            <input type="text" placeholder="Digite seu CPF">
                        </div>
                    </div>
                    <div id="segunda_parte_form">
                        <div class="input-group">
                            <label>Empresa Associada:</label>
                            <input type="text" placeholder="Selecione sua empresa">
                        </div>
                        <div class="input-group">
                            <label>Senha:</label>
                            <input type="password" placeholder="Crie sua senha">
                        </div>

                        <div class="input-group">
                            <label>Confirme sua senha:</label>
                            <input type="password" placeholder="Confirme sua senha">
                        </div>
                    </div>


                </div>

                <button class="entrar-button">CADASTRAR-SE</button>

                <div class="footer-links">
                    <a href="./TelaLogin.html">Já tem conta? Faça login</a>
                </div>

            </div>

            <div class="image-side">
                <img src="./img/flores.png">
            </div>

        </div>

    </div>

</body>

</html>
