<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./styles/cadastro.css">
    <link rel="shortcut icon" href="./img/logo.ico" type="image/x-icon">

</head>

<body>

    <div class="wrapper">

        <div class="header">
            <button class="back-button"><a href="./index.html">←</a></button>
            <div class="brand-name">Datalumini</div>
            <div class="icon">
                <img src="./img/logo.png">
            </div>
        </div>

        <div class="login-card">

            <div class="form-side">
                <h2>CADASTRE-SE</h2>

                <div class="form-grid">
                    <div id="primeira_parte_form">
                        <div class="input-group">
                            <label for="nome">Nome Completo:</label>
                            <input type="text" id="nome" placeholder="Digite seu nome">
                        </div>
                        <div class="input-group">
                            <label for=email>E-mail:</label>
                            <input type="email" id="email" placeholder="Digite seu e-mail">
                        </div> 
                        <div class="input-group">
                            <label for="cpf">CPF:</label>
                            <input type="text" id="cpf" placeholder="Digite seu CPF">
                        </div>
                    </div>
                    <div id="segunda_parte_form">
                        <div class="input-group">
                            <label for="empresa">Empresa Associada:</label>
                            <input type="text" id="empresa" placeholder="Selecione sua empresa">
                        </div>
                        <div class="input-group">
                            <label for="pass">Senha:</label>
                            <input type="password" id="senha" placeholder="Crie sua senha">
                            
                        </div>

                        <div class="input-group">
                            <label for:pass2>Confirme sua senha:</label>
                            <input type="password" id="senha2" placeholder="Confirme sua senha">
                            
                        </div>
                    </div>


                </div>

                <button class="entrar-button" onclick="cadastrar(email.value, senha.value, senha2.value, nome.value, cpf.value)">CADASTRAR-SE</button>

                <div class="footer-links">
                    <a href="./TelaLogin.html">Já tem conta? <strong>Faça login</strong></a>
                </div>

            </div>

            <div class="image-side">
                <img src="./img/flores.png">
            </div>

        </div>

        <div id="erros"></div>

    </div>

</body>
<script src="./js/script-auth.js"></script>

</html>
