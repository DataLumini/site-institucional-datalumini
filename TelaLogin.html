<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datalumini - Login</title>
    <link rel="stylesheet" href="./styles/login.css">
    <link rel="shortcut icon" href="./img/logo.ico" type="image/x-icon">

</head>

<body>

    <div class="wrapper">
        <header class="header">
            <button class="back-button"><a href="./index.html">←</a></button>
            <h1 class="brand-name">Datalumini</h1>
            <div class="icon">
                <img src="./img/logo.png" alt="logo">
            </div>
        </header>

        <main class="login-card">
            <div class="image-side">
                <img src="./img/flores.png" alt="Flores">
            </div>

            <div class="form-side">
                <h2>LOGIN</h2>

                <form id="formulario">
                    <div class="input-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail de login:">
                    </div>

                    <div class="input-group password-container-icon">
                        <label for="pass">Senha:</label>
                        <input type="password" id="pass" placeholder="Digite sua senha:">
                        <button type="button" id="password_icon" aria-label="Mostrar ou ocultar senha"
                            onclick="mostrarSenha()"></button>
                    </div>

                    <div class="options">
                        <input type="checkbox" id="check">
                        <label for="check">Mantenha-me conectado</label>
                    </div>
                </form>
                <div id="erros"></div>

                <button class="entrar-button" onclick="entrar(email.value, pass.value)"><a href="./dashboardEstufa.html"></a>ENTRAR</button>
                <div class="footer-links">
                    <p>Não tem login ainda?<a href="./TelaCadastro.html"><strong>Cadastre-se!</strong></a></p>
                </div>
            </div>
        </main>
    </div>

</body>

<script src="./js/script-auth.js"></script>
<script>

    function mostrarSenha() {
        if (pass.type == "password") {
            pass.type = "text";
            password_icon.style.backgroundImage = "url('./img/olhoOn.svg')";
        } else {
            pass.type = "password";
            password_icon.style.backgroundImage = "url('./img/olhoOff.svg')";
        }
    }

</script>

</html>
